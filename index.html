<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RMS Hunks Arcade</title>

<style>

body{
font-family:Arial;
background:#060612;
color:white;
text-align:center;
margin:0;
overflow-x:hidden;
}

h1{
color:#00eaff;
text-shadow:0 0 12px #00eaff,0 0 20px #ff00ff;
}

#board{
position:relative;
width:520px;
height:520px;
margin:40px auto;
border-radius:50%;
border:6px solid #00eaff;
box-shadow:0 0 30px #00eaff,inset 0 0 40px #ff00ff;
transition:transform 3s cubic-bezier(.2,.8,.2,1);
background:conic-gradient(
#ff0066 0deg 16deg,
#111 16deg 32deg,
#ff0066 32deg 48deg,
#111 48deg 64deg,
#ff0066 64deg 80deg,
#111 80deg 96deg,
#ff0066 96deg 112deg,
#111 112deg 128deg,
#ff0066 128deg 144deg,
#111 144deg 160deg,
#ff0066 160deg 176deg,
#111 176deg 192deg,
#ff0066 192deg 208deg,
#111 208deg 224deg,
#ff0066 224deg 240deg,
#111 240deg 256deg,
#ff0066 256deg 272deg,
#111 272deg 288deg,
#ff0066 288deg 304deg,
#111 304deg 320deg,
#ff0066 320deg 336deg,
#111 336deg 360deg
);
}

.segment{
position:absolute;
font-size:12px;
color:#00eaff;
text-shadow:0 0 6px #00eaff;
background:rgba(0,0,0,0.6);
padding:3px 6px;
border-radius:6px;
white-space:nowrap;
transform-origin:center;
}

.segment.highlight{
color:#ff00ff;
text-shadow:0 0 10px #ff00ff,0 0 20px #ff00ff;
transform:scale(1.3);
}

#bull{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:50px;
height:50px;
border-radius:50%;
background:#00eaff;
color:black;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
box-shadow:0 0 20px #00eaff,0 0 40px #ff00ff;
}

/* BULLET HOLES */

.bullet{
position:absolute;
width:16px;
height:16px;
border-radius:50%;
background:radial-gradient(circle,#000 30%,#444 50%,transparent 60%);
box-shadow:0 0 6px #000;
}

/* GLASS CRACK */

.crack{
position:absolute;
width:120px;
height:120px;
border-radius:50%;
pointer-events:none;
background:
radial-gradient(circle,transparent 40%,rgba(255,255,255,.3) 41%,transparent 42%);
animation:fadeCrack 2s forwards;
}

@keyframes fadeCrack{
0%{opacity:1}
100%{opacity:0}
}

/* CONFETTI */

.confetti{
position:absolute;
width:6px;
height:6px;
animation:fall 1.2s linear forwards;
}

@keyframes fall{
0%{transform:translateY(0)}
100%{transform:translateY(400px)}
}

button{
padding:14px 28px;
font-size:18px;
background:#00eaff;
border:none;
border-radius:8px;
cursor:pointer;
color:black;
font-weight:bold;
box-shadow:0 0 10px #00eaff;
margin:10px;
}

/* SCOREBOARD */

#results{
margin-top:20px;
font-size:24px;
color:#00eaff;
text-shadow:0 0 12px #00eaff;
opacity:0;
transform:scale(.8);
transition:.6s;
}

#results.show{
opacity:1;
transform:scale(1);
}

</style>
</head>

<body>

<h1>🎯 RMS Hunks Dartboard Arcade</h1>
<p>Throw 3 shots to decide your fate</p>

<div id="board">
<div id="bull">Simon<br>Moat</div>
</div>

<button onclick="shoot()">Shoot</button>
<button onclick="resetGame()">New Game</button>

<div id="results"></div>

<audio id="shot">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9e3d9c4b6e.mp3">
</audio>

<script>

const names=[
"Matty Wright","David Jones","Jack Cochrane","Peter Clark","James Reay",
"Brian Johnson","Kevin Stobbart","Matthew Scott","Bruce Walker","Tony Jiminez",
"Michael Storey","Jack Raine","Alistair Bowman","Ash Bughio","Jamie Duprey",
"Mark Lynskey","Michael Fox","Gordon Bird","Chris Fairbairn","Alan Reddy",
"Andrew Toes","George Smith"
];

let shuffled=[];
let results=[];
let shots=0;
let rotation=0;

const board=document.getElementById("board");

function shuffle(arr){
return [...arr].sort(()=>Math.random()-0.5);
}

function setupBoard(){

shuffled=shuffle(names);

document.querySelectorAll(".segment").forEach(e=>e.remove());

let step=360/shuffled.length;

shuffled.forEach((name,i)=>{

let angle=i*step;

let label=document.createElement("div");
label.className="segment";
label.innerText=name;

let r=210;

let rad=angle*Math.PI/180;

label.style.left=260+r*Math.cos(rad)-30+"px";
label.style.top=260+r*Math.sin(rad)-10+"px";
label.style.transform=`rotate(${angle}deg)`;

board.appendChild(label);

});

}

function confetti(){

for(let i=0;i<40;i++){

let c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*520+"px";
c.style.background=["#ff0","#0ff","#0f0","#f0f","#f00"][Math.floor(Math.random()*5)];

board.appendChild(c);

setTimeout(()=>c.remove(),1200);

}

}

function shoot(){

if(shots>=3)return;

let step=360/shuffled.length;

let spin=360*3+Math.random()*360;

rotation+=spin;

board.style.transition="transform 3s cubic-bezier(.2,.8,.2,1)";
board.style.transform=`rotate(${rotation}deg)`;

let finalRot=rotation%360;

let index=Math.floor((360-finalRot)/step)%shuffled.length;

document.querySelectorAll(".segment").forEach((el,i)=>{
el.classList.toggle("highlight",i===index);
});

setTimeout(()=>{

let angle=(index*step+finalRot)*Math.PI/180;

let x=260+Math.cos(angle)*180;
let y=260+Math.sin(angle)*180;

let hole=document.createElement("div");
hole.className="bullet";
hole.style.left=x+"px";
hole.style.top=y+"px";
board.appendChild(hole);

let crack=document.createElement("div");
crack.className="crack";
crack.style.left=x-50+"px";
crack.style.top=y-50+"px";
board.appendChild(crack);

document.getElementById("shot").play();

let name=shuffled[index];

if(Math.random()<0.05){

name="Simon Moat";

board.style.transition="transform 4s";
confetti();

}

results.push(name);
shots++;

if(shots===3)showResults();

},3000);

}

function showResults(){

let r=document.getElementById("results");

r.innerHTML=
"💋 Snog: "+results[0]+"<br>"+
"💍 Marry: "+results[1]+"<br>"+
"🚫 Avoid: "+results[2];

setTimeout(()=>r.classList.add("show"),200);

}

function resetGame(){

document.querySelectorAll(".bullet").forEach(e=>e.remove());
document.querySelectorAll(".crack").forEach(e=>e.remove());
document.querySelectorAll(".segment").forEach(e=>e.classList.remove("highlight"));

shots=0;
results=[];

rotation=0;

board.style.transform="rotate(0deg)";

document.getElementById("results").classList.remove("show");
document.getElementById("results").innerHTML="";

setupBoard();

}

setupBoard();

</script>

</body>
</html>
